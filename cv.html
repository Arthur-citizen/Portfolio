<!DOCTYPE html>
<html lang="fr">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>CV</title>
		<link rel="stylesheet" href="./styles.css" />
	</head>
	<body>
		<header class="site-header">
			<div class="header-inner">
				<p class="site-owner">Arthur Gavage</p>
				<div class="header-right">
					<nav>
						<a href="./index.html">Presentation</a>
						<a href="./activities.html">Activities</a>
						<a href="./cv.html" aria-current="page">CV</a>
					</nav>
					<button
						id="theme-toggle"
						class="theme-toggle"
						type="button"
						aria-label="Activer le mode sombre"
						title="Changer le theme"
					>
						<svg
							class="theme-icon theme-icon-moon"
							viewBox="0 0 24 24"
							aria-hidden="true"
							focusable="false"
						>
							<path
								d="M14.53 2.08a1 1 0 0 1 .18 1.2 8.5 8.5 0 1 0 10.01 10.01 1 1 0 0 1 1.38 1.18A10.5 10.5 0 1 1 13.35 1.7a1 1 0 0 1 1.18.38Z"
							/>
						</svg>
						<svg
							class="theme-icon theme-icon-sun"
							viewBox="0 0 24 24"
							aria-hidden="true"
							focusable="false"
							hidden
						>
							<path
								d="M12 4a1 1 0 0 1 1 1v1.2a1 1 0 1 1-2 0V5a1 1 0 0 1 1-1Zm0 13.8a1 1 0 0 1 1 1V20a1 1 0 1 1-2 0v-1.2a1 1 0 0 1 1-1ZM5.64 6.64a1 1 0 0 1 1.41 0l.85.85a1 1 0 0 1-1.41 1.41l-.85-.85a1 1 0 0 1 0-1.41Zm10.46 10.46a1 1 0 0 1 1.41 0l.85.85a1 1 0 1 1-1.41 1.41l-.85-.85a1 1 0 0 1 0-1.41ZM4 12a1 1 0 0 1 1-1h1.2a1 1 0 0 1 0 2H5a1 1 0 0 1-1-1Zm13.8 0a1 1 0 0 1 1-1H20a1 1 0 1 1 0 2h-1.2a1 1 0 0 1-1-1ZM6.64 18.36a1 1 0 0 1 0-1.41l.85-.85a1 1 0 0 1 1.41 1.41l-.85.85a1 1 0 0 1-1.41 0ZM17.1 8.9a1 1 0 0 1 0-1.41l.85-.85a1 1 0 1 1 1.41 1.41l-.85.85a1 1 0 0 1-1.41 0ZM12 8a4 4 0 1 1 0 8 4 4 0 0 1 0-8Z"
							/>
						</svg>
					</button>
				</div>
			</div>
		</header>

		<main>
			<section class="card cv-card">
				<h1>Curriculum Vitae</h1>
                <p class="cv-download">
					<a
						href="./data/Arthur CV 2025 - English v2.pdf"
						target="_blank"
						rel="noopener noreferrer"
						>Ouvrir le CV dans un nouvel onglet</a
					>
				</p>
				<div class="cv-viewer" role="region" aria-label="Apercu PDF du CV">
					<iframe
						class="cv-frame"
						src="./data/Arthur CV 2025 - English v2.pdf"
						title="CV PDF"
					></iframe>
				</div>
			</section>
		</main>

		<footer class="site-footer">
			<div class="footer-content">
				<p class="footer-name">Prenom Nom</p>
				<div class="footer-social" aria-label="Liens reseaux sociaux">
					<a
						class="social-link"
						href="https://github.com/votre-profil"
						target="_blank"
						rel="noopener noreferrer"
						aria-label="GitHub"
						title="GitHub"
					>
						<svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
							<path
								d="M12 1.5A10.5 10.5 0 0 0 8.68 22c.53.1.72-.23.72-.51v-1.94c-2.93.64-3.55-1.24-3.55-1.24-.48-1.2-1.17-1.52-1.17-1.52-.96-.66.07-.65.07-.65 1.06.07 1.62 1.09 1.62 1.09.95 1.62 2.49 1.15 3.1.88.1-.69.37-1.15.67-1.41-2.34-.27-4.8-1.17-4.8-5.2 0-1.15.41-2.08 1.08-2.82-.11-.27-.47-1.37.1-2.85 0 0 .88-.28 2.89 1.08a10.03 10.03 0 0 1 5.26 0c2.01-1.36 2.89-1.08 2.89-1.08.57 1.48.21 2.58.1 2.85.67.74 1.08 1.67 1.08 2.82 0 4.04-2.46 4.93-4.81 5.19.38.33.71.97.71 1.96v2.9c0 .28.19.61.73.51A10.5 10.5 0 0 0 12 1.5Z"
							/>
						</svg>
					</a>
					<a
						class="social-link"
						href="https://www.linkedin.com/in/votre-profil"
						target="_blank"
						rel="noopener noreferrer"
						aria-label="LinkedIn"
						title="LinkedIn"
					>
						<svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
							<path
								d="M6.94 8.5a1.94 1.94 0 1 1 0-3.88 1.94 1.94 0 0 1 0 3.88ZM5.23 9.96h3.42V20.5H5.23V9.96Zm5.37 0h3.28v1.44h.05c.46-.86 1.58-1.77 3.25-1.77 3.47 0 4.12 2.29 4.12 5.26v5.61h-3.42v-4.98c0-1.19-.02-2.72-1.66-2.72-1.67 0-1.93 1.3-1.93 2.64v5.06H10.6V9.96Z"
							/>
						</svg>
					</a>
				</div>
			</div>
		</footer>

		<script src="./script.js"></script>
	</body>
</html>
