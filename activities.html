<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Activities Proof</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header>
      <nav>
        <a href="/index.html">Presentation</a>
        <a href="/activities.html" aria-current="page">Activities</a>
      </nav>
    </header>

    <main>
      <section class="card">
        <h1>Proof of Activities</h1>
        <table>
          <thead>
            <tr>
              <th>Activity</th>
              <th>Hours</th>
              <th>Proof</th>
            </tr>
          </thead>
          <tbody id="activities-body"></tbody>
          <tfoot>
            <tr>
              <th scope="row">Total</th>
              <th id="total-hours">0</th>
              <th></th>
            </tr>
          </tfoot>
        </table>
      </section>
    </main>

    <script src="/script.js" defer></script>
  </body>
</html>
