<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Activities Proof</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="header-inner">
        <p class="site-owner">Arthur Gavage</p>
        <div class="header-right">
          <nav>
            <a href="./index.html">Presentation</a>
            <a href="./activities.html" aria-current="page">Activities</a>
            <a href="./cv.html">CV</a>
          </nav>
          <button
            id="theme-toggle"
            class="theme-toggle"
            type="button"
            aria-label="Activer le mode sombre"
            title="Changer le theme"
          >
            <img
              class="theme-icon theme-icon-moon"
              src="./assets/icone/moon-stars-svgrepo-com.svg"
              alt=""
              aria-hidden="false"
            />
            <img
              class="theme-icon theme-icon-sun"
              src="./assets/icone/sun-svgrepo-com.svg"
              alt=""
              hidden
              aria-hidden="true"
            />
          </button>
        </div>
      </div>
    </header>

    <main>
      <section class="card">
        <h1>Proof of Activities</h1>
        <table>
          <thead>
            <tr>
              <th>Activité</th>
              <th>Heure comptabilisée</th>
              <th>Heure passée</th>
              <th>Preuve</th>
              <th>Détails</th>
            </tr>
          </thead>
          <tbody id="activities-body"></tbody>
          <tfoot>
            <tr>
              <th scope="row">Total</th>
              <th id="total-hours">0</th>
              <th></th>
              <th></th>
              <th></th>
            </tr>
          </tfoot>
        </table>
      </section>

      <div id="activity-detail-overlay" class="detail-overlay" hidden>
        <section
          class="detail-panel"
          role="dialog"
          aria-modal="true"
          aria-labelledby="detail-title"
        >
          <button id="detail-close" class="detail-close" type="button" aria-label="Fermer les details">
            Fermer
          </button>
          <div class="detail-content">
            <div id="detail-images" class="detail-images"></div>
            <div class="detail-text">
              <p id="detail-category" class="detail-category"></p>
              <h2 id="detail-title">Activity details</h2>
              <p id="detail-hours" class="detail-hours"></p>
              <p id="detail-description" class="detail-description"></p>
            </div>
          </div>
        </section>
      </div>

      <div id="image-viewer-overlay" class="image-viewer-overlay" hidden>
        <button id="image-viewer-close" class="image-viewer-close" type="button" aria-label="Fermer le zoom">
          ✕
        </button>
        <img id="image-viewer-content" class="image-viewer-content" src="" alt="" />
      </div>
    </main>

    <footer class="site-footer">
      <div class="footer-content">
        <p class="footer-name">Arthur Gavage</p>
        <div class="footer-social" aria-label="Liens reseaux sociaux">
          <a
            class="social-link"
            href="https://github.com/arthur-citizen"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="GitHub"
            title="GitHub"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path
                d="M12 1.5A10.5 10.5 0 0 0 8.68 22c.53.1.72-.23.72-.51v-1.94c-2.93.64-3.55-1.24-3.55-1.24-.48-1.2-1.17-1.52-1.17-1.52-.96-.66.07-.65.07-.65 1.06.07 1.62 1.09 1.62 1.09.95 1.62 2.49 1.15 3.1.88.1-.69.37-1.15.67-1.41-2.34-.27-4.8-1.17-4.8-5.2 0-1.15.41-2.08 1.08-2.82-.11-.27-.47-1.37.1-2.85 0 0 .88-.28 2.89 1.08a10.03 10.03 0 0 1 5.26 0c2.01-1.36 2.89-1.08 2.89-1.08.57 1.48.21 2.58.1 2.85.67.74 1.08 1.67 1.08 2.82 0 4.04-2.46 4.93-4.81 5.19.38.33.71.97.71 1.96v2.9c0 .28.19.61.73.51A10.5 10.5 0 0 0 12 1.5Z"
              />
            </svg>
          </a>
          <a
            class="social-link"
            href="https://www.linkedin.com/in/arthur-gavage-60848936b/"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="LinkedIn"
            title="LinkedIn"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path
                d="M6.94 8.5a1.94 1.94 0 1 1 0-3.88 1.94 1.94 0 0 1 0 3.88ZM5.23 9.96h3.42V20.5H5.23V9.96Zm5.37 0h3.28v1.44h.05c.46-.86 1.58-1.77 3.25-1.77 3.47 0 4.12 2.29 4.12 5.26v5.61h-3.42v-4.98c0-1.19-.02-2.72-1.66-2.72-1.67 0-1.93 1.3-1.93 2.64v5.06H10.6V9.96Z"
              />
            </svg>
          </a>
        </div>
      </div>
    </footer>

    <script src="./script.js"></script>
  </body>
</html>
